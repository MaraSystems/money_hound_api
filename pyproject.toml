[tool.taskipy.tasks]

up_build = "docker compose up --build"

up = "docker compose up"

up_dev = "docker compose -f docker-compose.dev.yml up"

up_container = "docker compose -f docker-compose.local.yml up -d && python -m uvicorn src.main:app --host 0.0.0.0 --port 8080 --reload"

up_container_clean = "docker compose -f docker-compose.local.yml up -d && env CLEAN=1 python -m uvicorn src.main:app --host 0.0.0.0 --port 8080 --reload"

test_build = "docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from tests"

test = "docker compose -f docker-compose.test.yml up --abort-on-container-exit --exit-code-from tests"

test_container = "docker compose -f docker-compose.local.yml up -d && env ENV=TESTING pytest -v -s"

test_watch = "docker compose -f docker-compose.local.yml up -d && env ENV=TESTING pytest-watch -- -s"

queue = "celery -A src.config.queue worker --loglevel=info --pool=solo"

scheduler = "celery -A src.config.queue.celery_app beat --loglevel=info --pool=solo"

flower = "celery -A src.config.queue.celery_app flower --port=5555 --loglevel=info"

queue_restart = "sudo celery -A src.config.queue.celery_app multi restart worker --loglevel=info"

scheduler_restart = "sudo celery -A src.config.queue.celery_app multi restart beat --loglevel=info"

lint = "flake8 ."

down = "docker compose down && task queue_restart && task scheduler_restart"

install = "pip install -r requirements.txt"


[tool.pytest.ini_options]
markers = ["only: mark a test as the only one to run"]
asyncio_mode = "auto"
